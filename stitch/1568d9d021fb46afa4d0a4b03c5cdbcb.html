<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PULSEPUCK LITE - Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#859397",
                        "secondary": "#ffafd3",
                        "tertiary-fixed-dim": "#bdc2ff",
                        "error": "#ffb4ab",
                        "surface": "#0b1326",
                        "secondary-fixed": "#ffd8e7",
                        "inverse-surface": "#dae2fd",
                        "primary-container": "#22d3ee",
                        "surface-container-lowest": "#060e20",
                        "on-tertiary-fixed-variant": "#2f3aa3",
                        "outline-variant": "#3c494c",
                        "on-primary-container": "#005763",
                        "tertiary": "#d8daff",
                        "primary": "#8aebff",
                        "inverse-primary": "#006877",
                        "secondary-fixed-dim": "#ffafd3",
                        "on-secondary": "#620040",
                        "on-secondary-fixed-variant": "#85145a",
                        "on-surface-variant": "#bbc9cd",
                        "tertiary-container": "#b6bcff",
                        "on-secondary-fixed": "#3d0026",
                        "surface-tint": "#2fd9f4",
                        "secondary-container": "#85145a",
                        "surface-container-highest": "#2d3449",
                        "on-primary-fixed": "#001f25",
                        "on-surface": "#dae2fd",
                        "surface-dim": "#0b1326",
                        "surface-bright": "#31394d",
                        "on-tertiary-container": "#3842ab",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#ff93c8",
                        "on-tertiary-fixed": "#000767",
                        "on-primary-fixed-variant": "#004e5a",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#e0e0ff",
                        "surface-container": "#171f33",
                        "inverse-on-surface": "#283044",
                        "on-tertiary": "#131e8c",
                        "surface-container-high": "#222a3d",
                        "primary-fixed-dim": "#2fd9f4",
                        "on-background": "#dae2fd",
                        "surface-variant": "#2d3449",
                        "surface-container-low": "#131b2e",
                        "background": "#0b1326",
                        "on-primary": "#00363e",
                        "on-error": "#690005",
                        "primary-fixed": "#a2eeff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-compact": "16px",
                        "gutter": "12px",
                        "panel-padding": "12px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Space Grotesk"],
                        "body": ["Inter"],
                        "headline-sm": ["Space Grotesk"],
                        "hud-display": ["Inter"],
                        "hud-label": ["Inter"],
                        "headline-lg": ["Space Grotesk"],
                        "headline-lg-mobile": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-sm": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "hud-display": ["20px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "800" }],
                        "hud-label": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["32px", { "lineHeight": "1.1", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .neon-border {
            box-shadow: inset 0 0 0 1px theme('colors.primary'), 0 0 10px theme('colors.primary/40');
        }
        .neon-border-secondary {
            box-shadow: inset 0 0 0 1px theme('colors.secondary'), 0 0 10px theme('colors.secondary/40');
        }
        .neon-text-primary {
            text-shadow: 0 0 8px theme('colors.primary');
        }
        .neon-text-secondary {
            text-shadow: 0 0 8px theme('colors.secondary');
        }
        .hud-panel {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        .grid-bg {
            background-image: linear-gradient(theme('colors.primary/10') 1px, transparent 1px),
                              linear-gradient(90deg, theme('colors.primary/10') 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .game-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.2) 100%);
            transition: all 0.2s ease;
        }
        .game-btn:hover {
            box-shadow: inset 0 0 0 1px theme('colors.primary'), 0 0 20px theme('colors.primary/60');
            text-shadow: 0 0 10px theme('colors.primary');
        }
        .game-btn-secondary:hover {
            box-shadow: inset 0 0 0 1px theme('colors.secondary'), 0 0 20px theme('colors.secondary/60');
            text-shadow: 0 0 10px theme('colors.secondary');
        }
        .cyber-bracket {
            position: relative;
            border: 1px solid theme('colors.primary/30');
        }
        .cyber-bracket::before, .cyber-bracket::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid theme('colors.secondary');
        }
        .cyber-bracket::before {
            top: -2px; left: -2px;
            border-right: none; border-bottom: none;
        }
        .cyber-bracket::after {
            bottom: -2px; right: -2px;
            border-left: none; border-top: none;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body overflow-hidden">
<!-- TopNavBar (Shared Component) -->
<!-- SUPPRESSED: Screen intent is focused Gameplay. Navbar would obscure canvas. -->
<!-- SideNavBar (Shared Component) -->
<!-- SUPPRESSED: Screen intent is focused Gameplay. -->
<!-- Main Game Canvas Container -->
<main class="flex-grow flex items-center justify-center relative p-margin-compact">
<!-- Background Grid -->
<div class="absolute inset-0 grid-bg opacity-30 z-0"></div>
<!-- HUD: Corner Anchors -->
<div class="absolute top-margin-compact left-margin-compact z-20 flex gap-gutter">
<div class="hud-panel px-panel-padding py-2 rounded">
<p class="font-hud-label text-hud-label text-outline uppercase">SCORE</p>
<p class="font-hud-display text-hud-display text-primary neon-text-primary">024,590</p>
</div>
<div class="hud-panel px-panel-padding py-2 rounded">
<p class="font-hud-label text-hud-label text-outline uppercase">LEVEL</p>
<p class="font-hud-display text-hud-display text-secondary neon-text-secondary">03</p>
</div>
</div>
<div class="absolute top-margin-compact right-margin-compact z-20 flex gap-gutter">
<button class="hud-panel px-panel-padding py-2 rounded flex items-center gap-2 hover:bg-white/10 transition-colors" title="Pause Game [P]">
<span class="material-symbols-outlined text-outline">pause</span>
</button>
<button class="hud-panel px-panel-padding py-2 rounded flex items-center gap-2 hover:bg-white/10 transition-colors" title="Settings">
<span class="material-symbols-outlined text-outline">settings</span>
</button>
</div>
<!-- Central Playfield -->
<div class="relative w-full max-w-4xl h-[716px] cyber-bracket bg-surface-container/40 backdrop-blur-md rounded-lg overflow-hidden z-10 shadow-[0_0_50px_rgba(34,211,238,0.1)] flex flex-col justify-end">
<!-- Break-away Targets (Top) -->
<div class="absolute top-8 w-full px-8 flex justify-center gap-2 flex-wrap">
<div class="w-16 h-6 bg-secondary/20 neon-border-secondary rounded-sm opacity-100"></div>
<div class="w-16 h-6 bg-secondary/20 neon-border-secondary rounded-sm opacity-50"></div>
<div class="w-16 h-6 bg-secondary/20 neon-border-secondary rounded-sm opacity-100"></div>
<div class="w-16 h-6 bg-secondary/20 neon-border-secondary rounded-sm opacity-100"></div>
<div class="w-16 h-6 bg-primary/20 neon-border rounded-sm opacity-100"></div>
<div class="w-16 h-6 bg-primary/20 neon-border rounded-sm opacity-100"></div>
<div class="w-16 h-6 bg-primary/20 neon-border rounded-sm opacity-50"></div>
</div>
<!-- Glowing Puck -->
<div class="absolute top-1/2 left-1/2 w-4 h-4 bg-primary rounded-full shadow-[0_0_20px_#22d3ee,0_0_40px_#22d3ee] animate-pulse -translate-x-1/2 -translate-y-1/2"></div>
<!-- Trail effect for puck -->
<div class="absolute top-[48%] left-[49%] w-3 h-3 bg-primary/40 rounded-full blur-[2px] -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute top-[46%] left-[48%] w-2 h-2 bg-primary/20 rounded-full blur-[4px] -translate-x-1/2 -translate-y-1/2"></div>
<!-- Player Paddle (Bottom) -->
<div class="w-32 h-4 bg-tertiary neon-border rounded-full mx-auto mb-8 shadow-[0_0_15px_rgba(216,218,255,0.6)] cursor-pointer"></div>
</div>
<!-- Start/Restart Controls Overlay (Optional state demonstration) -->
<div class="absolute bottom-margin-compact left-1/2 -translate-x-1/2 z-20 flex gap-gutter">
<button class="game-btn px-8 py-3 rounded neon-border text-primary font-hud-label text-hud-label uppercase tracking-widest bg-surface-container/80 backdrop-blur-sm">
                START GAME
            </button>
<button class="game-btn game-btn-secondary px-8 py-3 rounded neon-border-secondary text-secondary font-hud-label text-hud-label uppercase tracking-widest bg-surface-container/80 backdrop-blur-sm">
                RESTART
            </button>
</div>
<!-- Pause Overlay (Hidden by default, shown here for completeness) -->
<div class="absolute inset-0 bg-background/80 backdrop-blur-xl z-50 flex items-center justify-center hidden" id="pauseOverlay">
<div class="text-center cyber-bracket p-12 bg-surface-container/50">
<h2 class="font-headline-lg md:font-headline-lg-mobile text-headline-lg md:text-headline-lg-mobile text-primary neon-text-primary mb-4">PAUSED</h2>
<p class="font-hud-label text-hud-label text-outline mb-8 uppercase tracking-widest">PRESS [P] TO RESUME</p>
<button class="game-btn px-8 py-3 rounded neon-border text-primary font-hud-label text-hud-label uppercase tracking-widest" onclick="document.getElementById('pauseOverlay').classList.add('hidden')">
                    RESUME
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Shared Component) -->
<!-- SUPPRESSED: Screen intent is focused Gameplay. Navbar would obscure canvas. -->
<script>
        // Simple script to toggle pause overlay for demonstration
        document.addEventListener('keydown', function(event) {
            if (event.key === 'p' || event.key === 'P') {
                const overlay = document.getElementById('pauseOverlay');
                overlay.classList.toggle('hidden');
            }
        });
    </script>
</body></html>
